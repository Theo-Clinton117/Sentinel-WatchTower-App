<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Status | Sentinel WatchTower</title>
  <link rel="stylesheet" href="./internal-ui.css" />
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    body {
      background:
        radial-gradient(1200px 520px at 10% -10%, rgba(59,130,246,.18), transparent 65%),
        radial-gradient(900px 420px at 90% 5%, rgba(244,63,94,.14), transparent 70%),
        #0b1220;
    }
    .panel {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(2, 6, 23, 0.5);
      backdrop-filter: blur(16px);
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 antialiased">
  <custom-navbar></custom-navbar>

  <main class="relative min-h-screen pt-32 pb-16 px-6">
    <div class="warning-sweep" aria-hidden="true"></div>
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(59,130,246,0.12),transparent_60%)]"></div>

    <div class="relative z-10 max-w-4xl mx-auto">
      <div class="panel">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-10 h-10 rounded-full bg-green-500/20 flex items-center justify-center">
            <i data-feather="check-circle" class="text-green-300"></i>
          </div>
          <div>
            <h1 id="successTitle" class="text-2xl font-semibold">Verifying payment...</h1>
            <p id="successSub" class="text-sm text-gray-400">Please wait while we confirm your transaction.</p>
          </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
          <div class="space-y-2 text-sm text-gray-300">
            <p><span class="text-gray-500">Plan:</span> <span id="successPlan">-</span></p>
            <p><span class="text-gray-500">Amount:</span> <span id="successAmount">-</span></p>
            <p><span class="text-gray-500">Reference:</span> <span id="successRef">-</span></p>
          </div>
          <div class="text-sm text-gray-300">
            <p id="successMessage" class="text-gray-400">If verification takes longer, click retry.</p>
            <button id="successRetry" class="mt-4 px-4 py-2 rounded bg-gray-700 hover:bg-gray-600 text-white text-xs">Retry Verification</button>
          </div>
        </div>

        <div class="mt-6 flex flex-wrap items-center gap-3 text-xs text-gray-400">
          <a href="./sub.html" class="px-3 py-1 rounded-full bg-gray-800 border border-gray-700 hover:text-gray-200">Back to Plans</a>
          <a href="./dashboard.html" class="px-3 py-1 rounded-full bg-blue-600/70 border border-blue-500/40 hover:text-white">Go to Dashboard</a>
        </div>
      </div>
    </div>
  </main>

  <custom-footer></custom-footer>

  <script src="./components/navbar.js"></script>
  <script src="./components/footer.js"></script>
  <script src="./success.js"></script>
  <script>
    feather.replace();
  </script>
</body>
</html>
