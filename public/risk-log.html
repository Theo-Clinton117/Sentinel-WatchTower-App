<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Risk Log | Sentinel WatchTower</title>
<link rel="stylesheet" href="./internal-ui.css" />
<script src="https://unpkg.com/feather-icons"></script>
<style>
  body {
    background:
      radial-gradient(1200px 520px at 15% -10%, rgba(59,130,246,.18), transparent 65%),
      radial-gradient(900px 420px at 90% 5%, rgba(239,68,68,.12), transparent 70%),
      #0b1220;
  }
  .risk-low { color: #34d399; }
  .risk-medium { color: #facc15; }
  .risk-high { color: #f87171; }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.7rem;
    border-radius: 999px;
    padding: 0.2rem 0.5rem;
    border: 1px solid rgba(100, 116, 139, 0.5);
    background: rgba(51, 65, 85, 0.28);
    color: #cbd5e1;
  }
</style>
</head>
<body class="bg-gray-900 text-gray-100 antialiased relative">
<div class="warning-sweep" aria-hidden="true"></div>
<custom-navbar></custom-navbar>

<main class="relative overflow-hidden min-h-screen pt-16">
  <div class="relative max-w-7xl mx-auto px-6 py-8 z-10 space-y-6">
    <section class="bg-gray-800/50 backdrop-blur-sm rounded-xl border border-gray-700 p-6">
      <h2 class="text-2xl font-semibold mb-3 flex items-center gap-2"><i data-feather="list"></i> Risk Log</h2>
      <p class="text-sm text-gray-300">Track verified and unverified alerts in one timeline. Filter by status, severity, zone, and time window.</p>
    </section>

    <section class="bg-gray-800/50 backdrop-blur-sm rounded-xl border border-gray-700 p-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <select id="statusFilter" class="w-full p-2 rounded bg-gray-700 text-white">
          <option value="all">Status: All</option>
          <option value="confirmed">Confirmed</option>
          <option value="likely">Likely</option>
          <option value="pending">Pending</option>
          <option value="unverified">Unverified</option>
          <option value="false">False</option>
        </select>
        <select id="severityFilter" class="w-full p-2 rounded bg-gray-700 text-white">
          <option value="all">Severity: All</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
        <select id="hoursFilter" class="w-full p-2 rounded bg-gray-700 text-white">
          <option value="168">Last 7 days</option>
          <option value="72">Last 72 hours</option>
          <option value="24">Last 24 hours</option>
          <option value="12">Last 12 hours</option>
          <option value="6">Last 6 hours</option>
        </select>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
        <input id="zoneFilter" class="w-full p-2 rounded bg-gray-700 text-white text-sm" placeholder="Zone key filter (e.g. 6.52:3.37)" />
        <input id="queryFilter" class="w-full p-2 rounded bg-gray-700 text-white text-sm" placeholder="Search description or type..." />
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
        <input id="fromDateFilter" type="datetime-local" class="w-full p-2 rounded bg-gray-700 text-white text-sm" />
        <input id="toDateFilter" type="datetime-local" class="w-full p-2 rounded bg-gray-700 text-white text-sm" />
      </div>
      <div class="mt-3 flex items-center gap-2">
        <button id="presetOpsBtn" class="text-xs bg-gray-700/50 px-3 py-2 rounded hover:bg-gray-700">Ops Preset</button>
        <button id="presetHighRiskBtn" class="text-xs bg-red-600/70 px-3 py-2 rounded hover:bg-red-600 text-white">High-Risk Preset</button>
        <button id="presetUnverifiedBtn" class="text-xs bg-yellow-600/70 px-3 py-2 rounded hover:bg-yellow-600 text-white">Unverified Queue</button>
      </div>
      <div class="mt-3 flex items-center gap-2">
        <span class="pill">Confirmed: <strong id="countConfirmed">0</strong></span>
        <span class="pill">Likely: <strong id="countLikely">0</strong></span>
        <span class="pill">Pending: <strong id="countPending">0</strong></span>
        <span class="pill">Unverified: <strong id="countUnverified">0</strong></span>
      </div>
    </section>

    <section class="bg-gray-800/50 backdrop-blur-sm rounded-xl border border-gray-700 p-6">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold flex items-center gap-2"><i data-feather="activity"></i> Alerts</h3>
        <div class="flex items-center gap-2">
          <select id="pageSizeSelect" class="p-2 rounded bg-gray-700 text-white text-xs">
            <option value="20">20 / page</option>
            <option value="50">50 / page</option>
            <option value="100">100 / page</option>
          </select>
          <button id="exportPageCsvBtn" class="text-xs bg-gray-700/80 px-3 py-2 rounded hover:bg-gray-700 text-white">Export Page CSV</button>
          <button id="exportCsvBtn" class="text-xs bg-blue-600 px-3 py-2 rounded hover:bg-blue-500 text-white">Export CSV</button>
          <p id="logMeta" class="text-xs text-gray-400">Loading...</p>
        </div>
      </div>
      <div id="riskLogList" class="space-y-3"></div>
      <div class="mt-3 flex items-center justify-between">
        <button id="prevPageBtn" class="text-xs bg-gray-700/50 px-3 py-2 rounded hover:bg-gray-700">Previous</button>
        <p id="pageMeta" class="text-xs text-gray-400">Page 1</p>
        <button id="nextPageBtn" class="text-xs bg-gray-700/50 px-3 py-2 rounded hover:bg-gray-700">Next</button>
      </div>
    </section>
  </div>
</main>

<custom-footer></custom-footer>
<script src="components/navbar.js"></script>
<script src="components/footer.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = 'https://bjmliqvtjjntkgxpwwkp.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_P3c1Q3lJqNyGYobS5wy-EA_xKDOetei';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const GRID_PRECISION = 2;

const statusFilter = document.getElementById('statusFilter');
const severityFilter = document.getElementById('severityFilter');
const hoursFilter = document.getElementById('hoursFilter');
const zoneFilter = document.getElementById('zoneFilter');
const queryFilter = document.getElementById('queryFilter');
const fromDateFilter = document.getElementById('fromDateFilter');
const toDateFilter = document.getElementById('toDateFilter');
const presetOpsBtn = document.getElementById('presetOpsBtn');
const presetHighRiskBtn = document.getElementById('presetHighRiskBtn');
const presetUnverifiedBtn = document.getElementById('presetUnverifiedBtn');
const riskLogList = document.getElementById('riskLogList');
const logMeta = document.getElementById('logMeta');
const pageSizeSelect = document.getElementById('pageSizeSelect');
const exportPageCsvBtn = document.getElementById('exportPageCsvBtn');
const exportCsvBtn = document.getElementById('exportCsvBtn');
const prevPageBtn = document.getElementById('prevPageBtn');
const nextPageBtn = document.getElementById('nextPageBtn');
const pageMeta = document.getElementById('pageMeta');
const countConfirmed = document.getElementById('countConfirmed');
const countLikely = document.getElementById('countLikely');
const countPending = document.getElementById('countPending');
const countUnverified = document.getElementById('countUnverified');

let allReports = [];
let filteredReports = [];
let currentPageReports = [];
let reportsChannel = null;
let reloadTimer = null;
let currentPage = 1;
let pageSize = 20;

function zoneKeyFor(lat, lng) {
  return `${Number(lat).toFixed(GRID_PRECISION)}:${Number(lng).toFixed(GRID_PRECISION)}`;
}

function classifyStatusClass(status) {
  if (status === 'confirmed') return 'risk-high';
  if (status === 'likely') return 'risk-medium';
  if (status === 'pending') return 'text-blue-300';
  if (status === 'unverified') return 'text-gray-300';
  return 'text-gray-500';
}

function applyFilters(rows) {
  const status = statusFilter.value;
  const severity = severityFilter.value;
  const hours = Number(hoursFilter.value || 168);
  const zone = String(zoneFilter.value || '').trim().toLowerCase();
  const query = String(queryFilter.value || '').trim().toLowerCase();
  const fromDate = fromDateFilter.value ? new Date(fromDateFilter.value).getTime() : null;
  const toDate = toDateFilter.value ? new Date(toDateFilter.value).getTime() : null;
  const since = Date.now() - hours * 3600000;

  return rows.filter(r => {
    const created = new Date(r.created_at).getTime();
    if (!Number.isFinite(created)) return false;
    if (Number.isFinite(fromDate) && created < fromDate) return false;
    if (Number.isFinite(toDate) && created > toDate) return false;
    if (!Number.isFinite(fromDate) && !Number.isFinite(toDate) && created < since) return false;
    if (status !== 'all' && r.status !== status) return false;
    if (severity !== 'all' && r.severity !== severity) return false;
    if (zone) {
      const z = zoneKeyFor(Number(r.lat), Number(r.lng)).toLowerCase();
      if (!z.includes(zone)) return false;
    }
    if (query) {
      const hay = `${r.type || ''} ${r.description || ''}`.toLowerCase();
      if (!hay.includes(query)) return false;
    }
    return true;
  });
}

function renderCounts(rows) {
  const counts = rows.reduce((acc, r) => {
    acc[r.status] = (acc[r.status] || 0) + 1;
    return acc;
  }, {});
  countConfirmed.textContent = String(counts.confirmed || 0);
  countLikely.textContent = String(counts.likely || 0);
  countPending.textContent = String(counts.pending || 0);
  countUnverified.textContent = String(counts.unverified || 0);
}

function renderRows(rows) {
  if (!rows.length) {
    riskLogList.innerHTML = '<p class="text-sm text-gray-400">No alerts match these filters.</p>';
    logMeta.textContent = '0 results';
    pageMeta.textContent = 'Page 1 of 1';
    prevPageBtn.disabled = true;
    nextPageBtn.disabled = true;
    return;
  }
  const totalPages = Math.max(1, Math.ceil(rows.length / pageSize));
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;
  const start = (currentPage - 1) * pageSize;
  const end = start + pageSize;
  const pageRows = rows.slice(start, end);
  currentPageReports = pageRows;

  riskLogList.innerHTML = pageRows.map(r => {
    const z = zoneKeyFor(Number(r.lat), Number(r.lng));
    const mapHref = `https://www.openstreetmap.org/?mlat=${Number(r.lat)}&mlon=${Number(r.lng)}#map=17/${Number(r.lat)}/${Number(r.lng)}`;
    return `
      <div class="p-3 rounded-lg bg-gray-700/30 border border-gray-700">
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="font-medium">${r.type || 'Incident'} <span class="text-xs text-gray-400">(${r.severity || '-'})</span></p>
            <p class="text-xs mt-1 ${classifyStatusClass(r.status)}">Status: ${(r.status || '-').toUpperCase()}</p>
            <p class="text-xs text-gray-400 mt-1">${r.description || 'No description'}</p>
            <p class="text-xs text-gray-500 mt-1">Zone: ${z} • ${new Date(r.created_at).toLocaleString()}</p>
          </div>
          <a href="${mapHref}" target="_blank" rel="noreferrer" class="px-2 py-1 bg-blue-600 rounded text-xs text-white hover:bg-blue-500">Map</a>
        </div>
      </div>
    `;
  }).join('');
  logMeta.textContent = `${rows.length} result(s)`;
  pageMeta.textContent = `Page ${currentPage} of ${totalPages}`;
  prevPageBtn.disabled = currentPage <= 1;
  nextPageBtn.disabled = currentPage >= totalPages;
}

function render() {
  filteredReports = applyFilters(allReports);
  renderCounts(filteredReports);
  renderRows(filteredReports);
}

function exportRowsCsv(rows, filePrefix = 'risk-log') {
  if (!rows.length) return;
  const headers = ['id', 'type', 'severity', 'status', 'description', 'lat', 'lng', 'zone_key', 'created_at', 'reviewed_at'];
  const escapeCsv = value => {
    const raw = String(value ?? '');
    if (raw.includes('"') || raw.includes(',') || raw.includes('\n')) {
      return `"${raw.replace(/"/g, '""')}"`;
    }
    return raw;
  };
  const csvRows = rows.map(r => [
    r.id,
    r.type,
    r.severity,
    r.status,
    r.description,
    r.lat,
    r.lng,
    zoneKeyFor(Number(r.lat), Number(r.lng)),
    r.created_at,
    r.reviewed_at || ''
  ]);
  const csv = [headers, ...csvRows].map(line => line.map(escapeCsv).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${filePrefix}-${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportFilteredCsv() {
  exportRowsCsv(filteredReports, 'risk-log-all');
}

function exportCurrentPageCsv() {
  exportRowsCsv(currentPageReports, `risk-log-page-${currentPage}`);
}

function applyPreset(preset) {
  if (preset === 'ops') {
    statusFilter.value = 'all';
    severityFilter.value = 'all';
    hoursFilter.value = '24';
    zoneFilter.value = '';
    queryFilter.value = '';
    fromDateFilter.value = '';
    toDateFilter.value = '';
  } else if (preset === 'high') {
    statusFilter.value = 'all';
    severityFilter.value = 'High';
    hoursFilter.value = '72';
    fromDateFilter.value = '';
    toDateFilter.value = '';
  } else if (preset === 'unverified') {
    statusFilter.value = 'unverified';
    severityFilter.value = 'all';
    hoursFilter.value = '168';
    fromDateFilter.value = '';
    toDateFilter.value = '';
  }
  currentPage = 1;
  render();
}

async function loadReports() {
  const { data: authData } = await supabase.auth.getUser();
  if (!authData?.user?.id) {
    window.location.href = './login.html';
    return;
  }
  const { data, error } = await supabase
    .from('reports')
    .select('id,type,severity,status,description,lat,lng,created_at,reviewed_at')
    .order('created_at', { ascending: false })
    .limit(1200);
  if (error) {
    riskLogList.innerHTML = '<p class="text-sm text-red-400">Unable to load risk log.</p>';
    logMeta.textContent = 'Load error';
    return;
  }
  allReports = data || [];
  render();
}

function scheduleReload() {
  if (reloadTimer) clearTimeout(reloadTimer);
  reloadTimer = setTimeout(() => {
    loadReports().catch(() => {});
  }, 250);
}

function subscribeRealtime() {
  reportsChannel = supabase
    .channel('risk-log-reports-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'reports' }, () => scheduleReload())
    .subscribe();
}

for (const el of [statusFilter, severityFilter, hoursFilter, zoneFilter, queryFilter, fromDateFilter, toDateFilter]) {
  const rerender = () => {
    currentPage = 1;
    render();
  };
  el.addEventListener('input', rerender);
  el.addEventListener('change', rerender);
}
pageSizeSelect.addEventListener('change', () => {
  pageSize = Number(pageSizeSelect.value || 20);
  currentPage = 1;
  render();
});
prevPageBtn.addEventListener('click', () => {
  currentPage -= 1;
  render();
});
nextPageBtn.addEventListener('click', () => {
  currentPage += 1;
  render();
});
exportCsvBtn.addEventListener('click', exportFilteredCsv);
exportPageCsvBtn.addEventListener('click', exportCurrentPageCsv);
presetOpsBtn.addEventListener('click', () => applyPreset('ops'));
presetHighRiskBtn.addEventListener('click', () => applyPreset('high'));
presetUnverifiedBtn.addEventListener('click', () => applyPreset('unverified'));

feather.replace();
await loadReports();
subscribeRealtime();

window.addEventListener('beforeunload', () => {
  if (reportsChannel) supabase.removeChannel(reportsChannel);
});
</script>
</body>
</html>
