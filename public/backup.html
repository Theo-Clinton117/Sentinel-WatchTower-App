<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentinel WatchTower Auth</title>
<script src="https://unpkg.com/feather-icons"></script>
<style>
:root{
  --bg:#0f172a; --card:#1e293bcc; --border:#334155;
  --muted:#94a3b8; --text:#f1f5f9; --primary:#2563eb;
  --success:#34d399; --error:#f87171;
}
*{box-sizing:border-box;}
body{margin:0;font-family:system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;min-height:100vh;background:var(--bg);color:var(--text);}
main{flex:1;display:flex;align-items:center;justify-content:center;position:relative;padding:20px;}
.radial-bg{position:absolute;inset:0;background:radial-gradient(circle at top, rgba(59,130,246,.15), transparent 55%);}
.auth-container{position:relative;width:100%;max-width:420px;}
.auth-card{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:16px;padding:40px 32px;box-shadow:0 20px 40px rgba(0,0,0,.4);}
.auth-header{text-align:center;margin-bottom:30px;}
.auth-header h1{margin:16px 0 6px;font-size:22px;}
.auth-header p{margin:0;font-size:14px;color:var(--muted);}
.form-wrapper{position:relative;overflow:hidden;transition:height .3s ease;}
form{position:absolute;width:100%;top:0;transition:all .35s ease;}
.form-group{margin-bottom:16px;}
label{font-size:14px;color:#cbd5e1;}
input,select{width:100%;margin-top:6px;padding:10px 12px;background:#1e293b;border:1px solid var(--border);border-radius:8px;color:white;font-size:14px;}
.password-wrapper{position:relative;}
.toggle-password{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--muted);}
.row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:20px;}
.row a{color:var(--primary);text-decoration:none;}
button.primary{width:100%;padding:12px;border:none;border-radius:8px;background:var(--primary);color:white;font-weight:600;cursor:pointer;}
.toggle-area{margin-top:28px;text-align:center;font-size:14px;color:var(--muted);}
.toggle-area button{background:none;border:none;color:var(--primary);font-weight:600;cursor:pointer;}
.form-alert{font-size:13px;margin-bottom:10px;}
.form-alert.error{color:var(--error);}
.form-alert.success{color:var(--success);}
@media(max-width:480px){.auth-card{padding:30px 20px;}}
</style>
</head>
<body>

<main>
  <div class="radial-bg"></div>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <i data-feather="shield" style="width:42px;height:42px;color:#3b82f6;"></i>
        <h1 id="formTitle"></h1>
        <p id="formSubtitle"></p>
      </div>
      <div id="formWrapper" class="form-wrapper">
        <!-- LOGIN -->
        <form id="loginForm">
          <div id="loginAlert" class="form-alert"></div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
              <input type="password" required />
              <i data-feather="eye" class="toggle-password"></i>
            </div>
          </div>
          <div class="row">
            <label style="display:flex;align-items:center;gap:6px;color:var(--muted);cursor:pointer;">
              <input id="rememberMe" type="checkbox" style="accent-color:var(--primary);" /> Remember me
            </label>
            <a href="#" id="forgotPassword">Forgot password?</a>
          </div>
          <button class="primary" type="submit">Sign In</button>
        </form>

        <!-- SIGNUP -->
        <form id="signupForm" style="left:100%;">
          <div id="signupAlert" class="form-alert"></div>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" required />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
              <input type="password" required />
              <i data-feather="eye" class="toggle-password"></i>
            </div>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <div class="password-wrapper">
              <input type="password" required />
              <i data-feather="eye" class="toggle-password"></i>
            </div>
          </div>
          <div class="form-group">
            <label>Role</label>
            <select id="roleSelect" required>
              <option value="user" selected>User</option>
              <option value="reviewer">Reviewer</option>
            </select>
          </div>
          <button class="primary" type="submit">Create Account</button>
        </form>
      </div>
      <div class="toggle-area">
        <span id="toggleText"></span>
        <button id="toggleBtn"></button>
      </div>
    </div>
  </div>
</main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = 'https://bjmliqvtjjntkgxpwwkp.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_P3c1Q3lJqNyGYobS5wy-EA_xKDOetei';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
window.supabase = supabase;

const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");
const wrapper = document.getElementById("formWrapper");
const toggleBtn = document.getElementById("toggleBtn");
const toggleText = document.getElementById("toggleText");
const formTitle = document.getElementById("formTitle");
const formSubtitle = document.getElementById("formSubtitle");
const loginAlert = document.getElementById("loginAlert");
const signupAlert = document.getElementById("signupAlert");
const rememberMe = document.getElementById("rememberMe");
const roleSelect = document.getElementById("roleSelect");

let mode = "login";

function adjustHeight() {
  wrapper.style.height = (mode === "login" ? loginForm : signupForm).offsetHeight + "px";
}

function render() {
  if(mode === "login"){
    loginForm.style.left = "0%";
    signupForm.style.left = "100%";
    formTitle.textContent = "Welcome Back";
    formSubtitle.textContent = "Sign in to access your risk dashboard";
    toggleText.textContent = "Don't have an account?";
    toggleBtn.textContent = "Sign up";
  } else {
    loginForm.style.left = "-100%";
    signupForm.style.left = "0%";
    formTitle.textContent = "Create Account";
    formSubtitle.textContent = "Join Sentinel WatchTower today";
    toggleText.textContent = "Already have an account?";
    toggleBtn.textContent = "Sign in";
  }
  loginAlert.textContent = "";
  signupAlert.textContent = "";
  adjustHeight();
  feather.replace();
}

toggleBtn.addEventListener("click", () => { mode = (mode === "login" ? "signup" : "login"); render(); });

// Password toggle
document.addEventListener("click", e => {
  const toggle = e.target.closest(".toggle-password");
  if(!toggle) return;
  const input = toggle.parentElement.querySelector("input");
  const isPassword = input.type === "password";
  input.type = isPassword ? "text" : "password";
  toggle.setAttribute("data-feather", isPassword ? "eye-off" : "eye");
  feather.replace();
});

// --- SIGNUP (RLS safe) ---
signupForm.addEventListener("submit", async e => {
  e.preventDefault();
  signupAlert.textContent = "";
  signupAlert.className = "form-alert";

  const name = signupForm.querySelector('input[type="text"]').value.trim();
  const email = signupForm.querySelector('input[type="email"]').value.trim();
  const password = signupForm.querySelectorAll('input[type="password"]')[0].value.trim();
  const confirm = signupForm.querySelectorAll('input[type="password"]')[1].value.trim();
  const role = roleSelect.value;

  if (!name || !email || !password || !confirm) {
    signupAlert.textContent = "All fields are required";
    signupAlert.className = "form-alert error";
    return;
  }
  if (password !== confirm) {
    signupAlert.textContent = "Passwords do not match";
    signupAlert.className = "form-alert error";
    return;
  }

  try {
    // Sign up user in Supabase Auth
    const { data: authData, error: authErr } = await supabase.auth.signUp({
      email,
      password,
      options: { data: { name } }
    });
    if (authErr) throw authErr;

    // Insert into users table (RLS safe)
    if (authData.user && authData.user.id) {
      const { error: dbErr } = await supabase.from('users').insert({
        id: authData.user.id,
        name,
        email,
        role,
        requested_reviewer: role === 'reviewer'
      });
      if (dbErr) throw dbErr;
    }

    signupAlert.textContent = "Signup successful! Check your email to confirm your account.";
    signupAlert.className = "form-alert success";
    setTimeout(() => toggleBtn.click(), 1200);

  } catch (err) {
    console.error(err);
    signupAlert.textContent = err.message || "Signup failed";
    signupAlert.className = "form-alert error";
  }
});

// --- LOGIN ---
loginForm.addEventListener("submit", async e => {
  e.preventDefault();
  loginAlert.textContent = "";

  const email = loginForm.querySelector('input[type="email"]').value.trim();
  const password = loginForm.querySelector('input[type="password"]').value.trim();
  const remember = rememberMe.checked;

  if(!email || !password){
    loginAlert.textContent = "Email and password required";
    loginAlert.className = "form-alert error";
    return;
  }

  try{
    const { data: authData, error } = await supabase.auth.signInWithPassword({ email, password });
    if(error) throw error;

    if(!authData.user.email_confirmed_at){
      loginAlert.textContent = "Please verify your email first";
      loginAlert.className = "form-alert error";
      return;
    }

    const { data: userData, error: userErr } = await supabase.from('users').select('*').eq('id', authData.user.id).single();
    if(userErr) throw userErr;

    if(remember) localStorage.setItem("userEmail", email);
    else sessionStorage.setItem("userEmail", email);

    if(userData.role==='reviewer') window.location.href="/reviewer-dashboard.html";
    else if(userData.requested_reviewer) { alert("Reviewer request pending approval."); window.location.href="/user-dashboard.html"; }
    else window.location.href="/user-dashboard.html";

  } catch(err){
    console.error(err);
    loginAlert.textContent = err.message || "Login error";
    loginAlert.className = "form-alert error";
  }
});

// Pre-fill remembered email
window.addEventListener("load",()=>{
  const saved = localStorage.getItem("userEmail")||sessionStorage.getItem("userEmail");
  if(saved){
    loginForm.querySelector('input[type="email"]').value=saved;
    rememberMe.checked = !!localStorage.getItem("userEmail");
  }
  render();
  window.addEventListener("resize",adjustHeight);
});

// Forgot password placeholder
document.getElementById("forgotPassword").addEventListener("click", e=>{
  e.preventDefault();
  loginAlert.textContent = "Password reset feature coming soon.";
  loginAlert.className = "form-alert error";
});
</script>
</body>
</html>
