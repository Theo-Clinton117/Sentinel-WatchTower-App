<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Watch | Sentinel WatchTower</title>
<link rel="stylesheet" href="./internal-ui.css" />
<script src="https://unpkg.com/feather-icons"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  .risk-low { color: #34d399; }
  .risk-medium { color: #facc15; }
  .risk-high { color: #f87171; }
  body {
    background:
      radial-gradient(1200px 520px at 15% -10%, rgba(59,130,246,.18), transparent 65%),
      radial-gradient(900px 420px at 90% 5%, rgba(239,68,68,.12), transparent 70%),
      #0b1220;
  }
  .page-ambient {
    position: fixed;
    pointer-events: none;
    border-radius: 9999px;
    filter: blur(52px);
    opacity: 0.45;
    z-index: 1;
  }
  .page-ambient.a { width: 340px; height: 340px; top: 130px; left: -110px; background: rgba(59,130,246,.30); }
  .page-ambient.b { width: 300px; height: 300px; bottom: 70px; right: -90px; background: rgba(244,63,94,.24); }
  .bg-gray-800\/50 {
    background: linear-gradient(155deg, rgba(30,41,59,.70), rgba(17,24,39,.74));
    border-color: rgba(71,85,105,.75);
    box-shadow: 0 18px 38px rgba(2,6,23,.35);
  }
  .bg-gray-700\/30 {
    background: linear-gradient(145deg, rgba(51,65,85,.30), rgba(30,41,59,.24));
  }
</style>
</head>
<body class="bg-gray-900 text-gray-100 antialiased relative">
<div class="warning-sweep" aria-hidden="true"></div>
<div class="page-ambient a" aria-hidden="true"></div>
<div class="page-ambient b" aria-hidden="true"></div>
<custom-navbar></custom-navbar>

<main class="relative overflow-hidden min-h-screen pt-16">
  <div class="relative max-w-7xl mx-auto px-6 py-8 z-10 space-y-6">
    <section class="bg-gray-800/50 backdrop-blur-sm rounded-xl border border-gray-700 p-6">
      <h2 class="text-2xl font-semibold mb-4 flex items-center gap-2"><i data-feather="radio"></i> Live Safety Watch</h2>
      <p id="watchTitle" class="text-sm text-gray-300">Loading watch session...</p>
      <p id="watchOwner" class="text-xs text-gray-400 mt-1"></p>
    </section>

    <section class="bg-gray-800/50 backdrop-blur-sm rounded-xl border border-gray-700 p-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-gray-700/30 border border-gray-700 rounded-lg p-4">
          <p class="text-xs text-gray-400">Current Location</p>
          <p id="watchLocation" class="font-medium mt-1">-</p>
        </div>
        <div class="bg-gray-700/30 border border-gray-700 rounded-lg p-4">
          <p class="text-xs text-gray-400">Area Risk</p>
          <p id="watchRisk" class="font-medium mt-1">-</p>
        </div>
        <div class="bg-gray-700/30 border border-gray-700 rounded-lg p-4">
          <p class="text-xs text-gray-400">Session Status</p>
          <p id="watchSessionStatus" class="font-medium mt-1">-</p>
        </div>
      </div>
    </section>

    <section class="bg-gray-800/50 backdrop-blur-sm rounded-xl border border-gray-700 p-6">
      <div id="watchMap" class="h-64 rounded-lg"></div>
    </section>
  </div>
</main>

<custom-footer></custom-footer>
<script src="components/navbar.js"></script>
<script src="components/footer.js"></script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = 'https://bjmliqvtjjntkgxpwwkp.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_P3c1Q3lJqNyGYobS5wy-EA_xKDOetei';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const GRID_PRECISION = 2;

const watchTitle = document.getElementById('watchTitle');
const watchOwner = document.getElementById('watchOwner');
const watchLocation = document.getElementById('watchLocation');
const watchRisk = document.getElementById('watchRisk');
const watchSessionStatus = document.getElementById('watchSessionStatus');

const params = new URLSearchParams(window.location.search);
const sessionId = params.get('session');

let sessionChannel = null;
let map = null;
let marker = null;
const NIGERIA_BOUNDS = [[4.0, 2.5], [14.8, 15.0]];
const reverseCache = new Map();

function createStableTileLayer(options = {}) {
  const urls = [
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png'
  ];
  let idx = 0;
  let errors = 0;
  const layer = L.tileLayer(urls[idx], {
    maxZoom: options.maxZoom || 19,
    attribution: options.attribution || '&copy; OpenStreetMap contributors'
  });
  layer.on('tileerror', () => {
    errors += 1;
    if (errors < 8 || idx >= urls.length - 1) return;
    idx += 1;
    errors = 0;
    layer.setUrl(urls[idx]);
  });
  layer.on('tileload', () => {
    if (errors > 0) errors -= 1;
  });
  return layer;
}

function applyNigeriaMapBounds(mapRef) {
  mapRef.setMaxBounds(NIGERIA_BOUNDS);
  mapRef.options.maxBoundsViscosity = 0.95;
}

async function reverseGeocode(lat, lng) {
  const key = `${Number(lat).toFixed(4)},${Number(lng).toFixed(4)}`;
  if (reverseCache.has(key)) return reverseCache.get(key);
  const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&addressdetails=1&accept-language=en`);
  if (!res.ok) throw new Error('reverse geocode failed');
  const data = await res.json();
  reverseCache.set(key, data);
  return data;
}

function getZoneKey(lat, lng) {
  return `${Number(lat).toFixed(GRID_PRECISION)}:${Number(lng).toFixed(GRID_PRECISION)}`;
}

function riskLabel(level) {
  if (level >= 4) return { label: 'High', className: 'risk-high' };
  if (level >= 2) return { label: 'Medium', className: 'risk-medium' };
  return { label: 'Low', className: 'risk-low' };
}

function initMap(lat, lng) {
  map = L.map('watchMap').setView([lat || 0, lng || 0], lat && lng ? 13 : 2);
  createStableTileLayer({ maxZoom: 19 }).addTo(map);
  applyNigeriaMapBounds(map);
  marker = L.marker([lat || 0, lng || 0]).addTo(map);
}

async function updateLocationInfo(lat, lng) {
  if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
    watchLocation.textContent = 'Location unavailable';
    watchRisk.textContent = '-';
    watchRisk.className = 'font-medium';
    return;
  }

  try {
    const [locationRes, riskRes] = await Promise.all([
      reverseGeocode(lat, lng),
      supabase.from('risk_zones').select('risk_level').eq('zone_key', getZoneKey(lat, lng)).maybeSingle()
    ]);

    const address = locationRes?.address || {};
    watchLocation.textContent = address.road && address.city
      ? `${address.road}, ${address.city}`
      : address.city || address.county || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;

    const level = Number(riskRes?.data?.risk_level || 0);
    const risk = riskLabel(level);
    watchRisk.textContent = `${risk.label} (${level})`;
    watchRisk.className = `font-medium ${risk.className}`;
  } catch (err) {
    console.error('Failed to update watch location info', err);
    watchLocation.textContent = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
  }
}

async function renderSession(session) {
  watchTitle.textContent = session?.title || 'Live Safety Watch';
  watchOwner.textContent = `Watching user: ${session?.owner_id || '-'}`;
  watchSessionStatus.textContent = session?.is_active ? 'Active' : 'Ended';

  const lat = Number(session?.current_lat);
  const lng = Number(session?.current_lng);

  if (!map) initMap(lat, lng);
  if (Number.isFinite(lat) && Number.isFinite(lng)) {
    marker.setLatLng([lat, lng]);
    map.setView([lat, lng], 13);
  }
  await updateLocationInfo(lat, lng);
}

async function loadSession() {
  if (!sessionId) {
    watchTitle.textContent = 'Invalid watch link';
    return;
  }

  const { data: authData } = await supabase.auth.getUser();
  if (!authData?.user?.id) {
    window.location.href = './login.html';
    return;
  }

  const { data: session, error } = await supabase
    .from('watch_sessions')
    .select('id, owner_id, title, current_lat, current_lng, is_active, started_at, ended_at')
    .eq('id', sessionId)
    .single();
  if (error) {
    console.error(error);
    watchTitle.textContent = 'Watch session unavailable or access denied';
    return;
  }
  const ownerResult = await supabase
    .from('users')
    .select('name, email')
    .eq('id', session.owner_id)
    .maybeSingle();
  if (ownerResult?.data) {
    const ownerLabel = ownerResult.data.name || ownerResult.data.email || session.owner_id;
    watchOwner.textContent = `Watching user: ${ownerLabel}`;
  }
  await renderSession(session);
}

function subscribeSession() {
  if (!sessionId) return;
  sessionChannel = supabase
    .channel(`watch-session-${sessionId}`)
    .on(
      'postgres_changes',
      { event: 'UPDATE', schema: 'public', table: 'watch_sessions', filter: `id=eq.${sessionId}` },
      payload => renderSession(payload.new)
    )
    .subscribe();
}

(async () => {
  feather.replace();
  await loadSession();
  subscribeSession();
})();

window.addEventListener('beforeunload', () => {
  if (sessionChannel) supabase.removeChannel(sessionChannel);
});
</script>
</body>
</html>
